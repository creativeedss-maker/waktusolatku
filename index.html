<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaktuSolatKu</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🕌 WaktuSolatKu</h1>
    <p>Waktu Solat Malaysia</p>
</header>

<main class="card">

    <h2>Selangor</h2>

    <table>
        <tr><td>Subuh</td><td id="subuh">05:50</td></tr>
        <tr><td>Syuruk</td><td id="syuruk">07:05</td></tr>
        <tr><td>Zohor</td><td id="zohor">13:18</td></tr>
        <tr><td>Asar</td><td id="asar">16:45</td></tr>
        <tr><td>Maghrib</td><td id="maghrib">19:28</td></tr>
        <tr><td>Isyak</td><td id="isyak">20:40</td></tr>
    </table>

    <div class="countdown">
        <h3>⏳ Solat Seterusnya</h3>
        <p id="nextPrayer">Maghrib lagi 1 jam 15 minit</p>
    </div>

</main>

<script src="script.js"></script>

</body>
</html>
